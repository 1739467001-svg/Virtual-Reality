<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR 太阳系漫游 · Solar System</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <!-- 加载提示 -->
  <div id="loading">正在构建太阳系…</div>

  <!-- 顶部标题 -->
  <header id="hud-top">
    <h1>🌌 太阳系漫游</h1>
    <p class="hint">鼠标左键拖拽旋转 · 滚轮缩放 · 右键平移 · 点击行星名飞过去</p>
  </header>

  <!-- 控制面板 -->
  <div id="controls">
    <div class="row">
      <button id="play-toggle" title="暂停 / 继续">⏸ 暂停</button>
      <button id="reset-view" title="回到全景视角">🏠 全景</button>
      <span class="label">速度</span>
      <input id="speed" type="range" min="0" max="500" value="60" />
      <span id="speed-val">60×</span>
    </div>
    <div class="row">
      <label><input id="toggle-orbits" type="checkbox" checked /> 轨道线</label>
      <label><input id="toggle-labels" type="checkbox" checked /> 标签</label>
    </div>
    <div class="row" id="planet-jump"></div>
  </div>

  <!-- 信息卡片 -->
  <div id="info-card" class="hidden">
    <button id="info-close">×</button>
    <h2 id="info-name"></h2>
    <p id="info-desc"></p>
    <ul id="info-stats"></ul>
  </div>

  <!-- Three.js 已打包进 vendor/（离线可用，无需联网、无需构建步骤）-->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.js",
      "three/addons/": "./vendor/three/addons/"
    }
  }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
